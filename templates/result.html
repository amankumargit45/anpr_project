<h2>🚨 Stolen Vehicles Detected</h2>

{% if plates %} {% for plate in plates %}
<p style="color: red; font-size: 20px;">{{ plate }}</p>
{% endfor %} {% else %}
<p style="color: green">No stolen vehicles detected ✅</p>
{% endif %}

<hr />

<h3>All Detected Plates:</h3>
{% for plate in all_detected %}
<p>{{ plate }}</p>
{% endfor %}
